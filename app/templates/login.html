<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · Polymarket OP Console</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="auth-page">
    <section class="panel auth-card">
      <p class="eyebrow">Authentication required</p>
      <h1>Sign in</h1>
      <p class="muted">Default username: <code>admin</code>. The password is created during first-run setup.</p>
      {% if error %}<p class="notice danger">{{ error }}</p>{% endif %}
      <form method="post" action="/login" class="stacked-form">
        <input type="hidden" name="next" value="{{ next }}">
        <label>Username <input name="username" value="admin" autocomplete="username" required></label>
        <label>Password <input name="password" type="password" autocomplete="current-password" required autofocus></label>
        <button type="submit">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
